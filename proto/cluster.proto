syntax = "proto3";

package aether;

import "common.proto";

// AetherCluster provides cluster membership management operations.
service AetherCluster {
    // MemberList lists all current cluster members.
    rpc MemberList(MemberListRequest) returns (MemberListResponse);

    // MemberAdd adds a new member to the cluster.
    rpc MemberAdd(MemberAddRequest) returns (MemberAddResponse);

    // MemberRemove removes a member from the cluster.
    rpc MemberRemove(MemberRemoveRequest) returns (MemberRemoveResponse);

    // MemberPromote promotes a learner member to a voting member.
    rpc MemberPromote(MemberPromoteRequest) returns (MemberPromoteResponse);
}

// Member represents a cluster member.
message Member {
    uint64 id = 1;
    string addr = 2;
    bool is_learner = 3;
    string data = 4;
}

message MemberListRequest {}

message MemberListResponse {
    ResponseHeader header = 1;
    repeated Member members = 2;
}

message MemberAddRequest {
    // addr is the address of the new member (host:port for Raft communication).
    string addr = 1;
    // is_learner adds the member as a non-voting learner if true.
    bool is_learner = 2;
}

message MemberAddResponse {
    ResponseHeader header = 1;
    Member member = 2;
    repeated Member members = 3;
}

message MemberRemoveRequest {
    // id is the node ID of the member to remove.
    uint64 id = 1;
}

message MemberRemoveResponse {
    ResponseHeader header = 1;
    repeated Member members = 2;
}

message MemberPromoteRequest {
    // id is the node ID of the learner to promote to voter.
    uint64 id = 1;
}

message MemberPromoteResponse {
    ResponseHeader header = 1;
    repeated Member members = 2;
}
