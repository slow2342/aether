[package]
name = "aether"
version = "0.1.0"
edition = "2024"

[dependencies]
# Raft 共识
openraft = { version = "0.9", features = ["serde", "storage-v2"] }

# 存储
rocksdb = "0.24.0"
serde = { version = "1.0.228", features = ["derive"] }
rkyv = "0.8"

# gRPC
tonic = "0.14"
prost = "0.14"

# 运行时
tokio = { version = "1", features = ["full"] }

# 日志
tracing = "0.1"
tracing-subscriber = "0.3"

# 工具
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"

[build-dependencies]
tonic-build = "0.14"

[dev-dependencies]
criterion = "0.8"
tempfile = "3"
