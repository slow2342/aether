[package]
name = "aether"
version = "0.1.0"
edition = "2024"

[dependencies]
# 序列化
serde = { version = "1.0", features = ["derive"] }

# 运行时
tokio = { version = "1", features = ["full"] }

# 日志
tracing = "0.1"
tracing-subscriber = "0.3"

# 工具
clap = { version = "4", features = ["derive"] }
anyhow = "1"
thiserror = "2"
toml = "0.8"

[dev-dependencies]
tempfile = "3"
